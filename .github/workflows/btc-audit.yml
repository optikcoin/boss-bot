
name: BTC Multi-Exchange Audit

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of historical data'
        required: true
        default: '7'
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas numpy
      
      - run: |
          python btc_tp_sl_audit.py \
            --days ${{ github.event.inputs.days }} \
            --out-report btc_audit_report.txt \
            --out-json btc_audit_results.json
      
      - run: cat btc_audit_report.txt >> $GITHUB_STEP_SUMMARY
        if: always()
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: btc-audit-${{ github.run_number }}
          path: |
            btc_audit_report.txt
            btc_audit_results.json
          retention-days: 30
